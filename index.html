<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Movie Database</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <div class="flex flex-col">
      <div class="navbar flex flex-col">
        <div class="flex content-wrapper justify-between align-center">
          <div class="logo">
            <img class="logo" src="./assets/pngimg.com - filmstrip_PNG158.png" alt="">
          </div>
          <div class="links flex align-center justify-between">
            <a href="#" class="link router-link-active">Home</a>
            <a href="" class="link router-link-exact-active router-link-active">Movies</a>
          </div>
        </div>
        <div class="content-wrapper flex-col align-center">
          <h1>Browse our movies</h1>
          <div class="input-wrap">
            <input type="text" class="input" placeholder="Search by Title, Director or Keyword">
            <div class="search-wrapper flex justify-between align-center">
              <svg data-v-390ceb07="" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="search" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="svg-inline--fa fa-search fa-w-16"><path data-v-390ceb07="" fill="currentColor" d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z" class=""></path></svg>
            </div>
          </div>
        </div>
      </div>
      <section id="search">
        
        <div class="content-wrapper justify-between">
          <h1 class="search-info">
            <span class="white-txt">Search results:</span>
          </h1>
        </div>
        <div id="movies">
          <div class="content-wrapper">
            <div class="loading-state flex justify-center">
              <svg data-v-cf78a876="" data-v-ca62299c="" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="spinner" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="svg-inline--fa fa-spinner fa-w-16" style="font-size: 30px; color: rgb(96, 48, 177);"><path data-v-cf78a876="" fill="currentColor" d="M304 48c0 26.51-21.49 48-48 48s-48-21.49-48-48 21.49-48 48-48 48 21.49 48 48zm-48 368c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48-21.49-48-48-48zm208-208c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48-21.49-48-48-48zM96 256c0-26.51-21.49-48-48-48S0 229.49 0 256s21.49 48 48 48 48-21.49 48-48zm12.922 99.078c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48c0-26.509-21.491-48-48-48zm294.156 0c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48c0-26.509-21.49-48-48-48zM108.922 60.922c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48-21.491-48-48-48z" class=""></path></svg>
            </div>
          </div>
        </div>
        <div class="overlay"></div>
      </section>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
